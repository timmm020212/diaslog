services:
  app:
    build: .
    container_name: diaslog-spy
    # Где лежат .env и сессии. Пусто = рядом с кодом (./data, ./data-friend).
    # В облаке задают DIASLOG_DATA_DIR=/data на примонтированном диске.
    environment:
      - DIASLOG_DATA_DIR=${DIASLOG_DATA_DIR:-}
    volumes:
      # Код + .env + сессии (data/, data-friend/) монтируются с хоста и сохраняются.
      - ./:/app
    restart: unless-stopped
