name: build-image

# Собирает Docker-образ и публикует в GHCR (ghcr.io) при каждом пуше в main.
# Кроме :latest вешает уникальный тег sha-<коммит> — указав его в dockhost,
# заставляешь панель гарантированно скачать свежий образ (тег :latest часто
# берётся из кэша и не обновляется).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
